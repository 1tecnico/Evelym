<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Mochila Virtual - 2º Ano</title>

<style>

body{
font-family: Arial, sans-serif;
background-color:#ffd6e7;
margin:0;
padding:0;
overflow-x:hidden;

/* Fundo com corações */
background-image: url('https://i.imgur.com/8QfQG6S.png');
background-size: 200px;
}

/* FUNDO COM NOMES */
.fundo-nomes{
position: fixed;
width:100%;
height:100%;
top:0;
left:0;
z-index:0;
pointer-events:none;
}

.nome{
position:absolute;
font-size:35px;
color: rgba(255, 20, 147, 0.25); /* mais rosa */
font-family: "Brush Script MT", cursive;
}

/* TÍTULO FOFO */
h1{
font-family: "Brush Script MT", cursive;
font-size:40px;
color:#ffe4ef;
}

/* CONTEÚDO */
header, .container, footer{
position: relative;
z-index:1;
}

.container{
padding:20px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:15px;
max-width:1400px;
margin:auto;
}

header{
background-color:#ff69b4;
text-align:center;
padding:20px;
border-bottom:3px solid #ff4fa3;
}

.disciplina{
background-color:#fff0f6;
padding:15px;
border-radius:15px;
box-shadow:0px 4px 10px rgba(0,0,0,0.1);
transition:0.3s;
}

.disciplina:hover{
transform:scale(1.05);
}

textarea{
width:100%;
height:60px;
margin-top:10px;
background-color:#ffe4ef;
border:1px solid #ff69b4;
border-radius:8px;
resize:none;
padding:5px;
}

input[type="file"]{
margin-top:10px;
}

footer{
background-color:#ff69b4;
color:white;
text-align:center;
padding:10px;
margin-top:20px;
}

/* LOGIN */
#login{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#ff69b4;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:999;
color:white;
}

#login input{
padding:10px;
border:none;
border-radius:10px;
margin-top:10px;
}

#login button{
margin-top:10px;
padding:10px;
border:none;
border-radius:10px;
background:white;
color:#ff69b4;
cursor:pointer;
}

</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
<h2>🔐 Digite a senha</h2>
<input type="password" id="senha" placeholder="Senha...">
<button onclick="entrar()">Entrar</button>
</div>

<!-- FUNDO -->
<div class="fundo-nomes" id="fundo"></div>

<header>
<h1>🎒 Mochila Virtual - Evelym 💖</h1>
</header>

<div class="container">

<div class="disciplina"><h2>📘 Matemática</h2><textarea></textarea><input type="file"></div>
<div class="disciplina"><h2>📗 Português</h2><textarea></textarea><input type="file"></div>
<div class="disciplina"><h2>📕 História</h2><textarea></textarea><input type="file"></div>
<div class="disciplina"><h2>📙 Geografia</h2><textarea></textarea><input type="file"></div>
<div class="disciplina"><h2>🧪 Química</h2><textarea></textarea><input type="file"></div>
<div class="disciplina"><h2>🔬 Física</h2><textarea></textarea><input type="file"></div>
<div class="disciplina"><h2>🧬 Biologia</h2><textarea></textarea><input type="file"></div>
<div class="disciplina"><h2>🌎 Inglês</h2><textarea></textarea><input type="file"></div>

</div>

<footer>
💖 Feito com amor por Evelym 💖
</footer>

<script>

// SENHA
function entrar(){
let senha = document.getElementById("senha").value;

if(senha.toLowerCase() === "evelym"){
document.getElementById("login").style.display = "none";
}else{
alert("Senha incorreta!");
}
}

// NOMES NO FUNDO (30)
let fundo = document.getElementById("fundo");

for(let i=0; i<30; i++){
let nome = document.createElement("div");
nome.className = "nome";
nome.innerText = "Evelym 💖";

nome.style.top = Math.random()*100 + "%";
nome.style.left = Math.random()*100 + "%";

fundo.appendChild(nome);
}

</script>

</body>
</html>
