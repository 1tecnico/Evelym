<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Mochila Virtual - 2º Ano</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 0;
        }

        header {
            background-color: #4a90e2;
            color: white;
            padding: 20px;
            text-align: center;
        }

        .container {
            padding: 20px;
        }

        .disciplina {
            background-color: white;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 10px;
            box-shadow: 0px 2px 5px rgba(0,0,0,0.1);
        }

        h2 {
            margin-top: 0;
        }

        textarea {
            width: 100%;
            height: 80px;
            margin-top: 10px;
        }

        input[type="file"] {
            margin-top: 10px;
        }

        footer {
            background-color: #4a90e2;
            color: white;
            text-align: center;
            padding: 10px;
            margin-top: 20px;
        }

        button {
            background-color: #4a90e2;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 10px;
        }

        button:hover {
            background-color: #357ABD;
        }
    </style>
</head>
<body>

<header>
    <h1>🎒 Mochila Virtual - 2º Ano do Ensino Médio</h1>
</header>

<div class="container">

    <div class="disciplina">
        <h2>📘 Matemática</h2>
        <textarea placeholder="Anotações de Matemática..."></textarea>
        <br>
        <input type="file">
    </div>

    <div class="disciplina">
        <h2>📗 Português</h2>
        <textarea placeholder="Anotações de Português..."></textarea>
        <br>
        <input type="file">
    </div>

    <div class="disciplina">

        <br>

    </div>

    <div class="disciplina">

        <textarea placeholder="Anotações de Geografia..."></textarea>
        <br>
        <input type="file">
    </div>

    <div class="disciplina">

        <textarea placeholder="Anotações de Química..."></textarea>
        <br>
        <input type="file">
    </div>

    <div class="disciplina">

        <textarea placeholder="Anotações de Física..."></textarea>
        <br>
        <input type="file">

    <div class="disciplina">
        <h2>🧬 Biologia</h2>

        <br>
        <input type="file">

    <div class="disciplina">
        <h2>🌎 Inglês</h2>
        <textarea placeholder="Anotações de Inglês..."></textarea>
        <br>
        <input type="file">

</div>

<footer>
    © 2026 - Minha Mochila Virtual
</footer>

</html>
